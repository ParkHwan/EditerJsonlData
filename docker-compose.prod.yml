# ── GCP Compute Engine 운영 환경 (Phase 7) ──
# Nginx + Gunicorn + Redis Sentinel HA
# 사용법: docker compose -f docker-compose.prod.yml up -d  또는  make prod

version: '3.8'

services:
  # ── Nginx 리버스 프록시 ──
  nginx:
    image: nginx:1.25-alpine
    container_name: editer-jsonl-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-http-only.conf:/etc/nginx/nginx.conf:ro
      - static-files:/usr/share/nginx/static:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      web:
        condition: service_started
    restart: always

  # ── FastAPI (Gunicorn + Uvicorn Workers) ──
  web:
    image: ${DOCKER_IMAGE:-asia-northeast1-docker.pkg.dev/crowdworks-platform/editer-jsonl/web:latest}
    container_name: editer-jsonl-web
    command: >
      sh -c "cp -r /app/static/* /app/static-serve/ && gunicorn app.main:app -c gunicorn.conf.py"
    volumes:
      - ./data:/app/data
      - ./.security:/app/.security:ro
      - app-logs:/app/logs
      - static-files:/app/static-serve
    env_file:
      - .env.production
    environment:
      - REDIS_HOST=redis-sentinel
      - REDIS_PORT=26379
      - REDIS_SERVICE_NAME=mymaster
    depends_on:
      redis-sentinel:
        condition: service_healthy
    restart: always

  # ── Redis Master ──
  redis-master:
    image: redis:7-alpine
    container_name: editer-jsonl-redis-master
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-master-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  # ── Redis Slave ──
  redis-slave:
    image: redis:7-alpine
    container_name: editer-jsonl-redis-slave
    command: redis-server --replicaof redis-master 6379 --appendonly yes
    depends_on:
      redis-master:
        condition: service_healthy
    volumes:
      - redis-slave-data:/data
    restart: always

  # ── Redis Sentinel ──
  redis-sentinel:
    image: redis:7-alpine
    container_name: editer-jsonl-redis-sentinel
    command: >
      sh -c "cp /etc/sentinel/sentinel.conf /tmp/sentinel.conf &&
             redis-sentinel /tmp/sentinel.conf --protected-mode no"
    volumes:
      - ./redis/sentinel.conf:/etc/sentinel/sentinel.conf:ro
    depends_on:
      redis-master:
        condition: service_healthy
      redis-slave:
        condition: service_started
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "26379", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    restart: always

volumes:
  redis-master-data:
  redis-slave-data:
  nginx-logs:
  app-logs:
  static-files:
